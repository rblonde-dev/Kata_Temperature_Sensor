<ul>
    @for(sensor of sensors(); track sensor.id)
    {
        <li>
            <app-sensor [sensor]="sensor">
            </app-sensor>
        </li>
    }
</ul>

<div> high </div>
<input type="number" value="{{highTemperature()}}" (click)="UpdateHighTemperature($any($event).target.value)">

<div> low </div>
<input type="number" value="{{lowTemperature()}}" (click)="UpdateLowTemperature($any($event).target.value)">
